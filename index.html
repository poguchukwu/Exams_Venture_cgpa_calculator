    <style>
        :root {
            --bg: #0b0e14;
            --card: rgba(22, 27, 34, 0.7);
            --accent: #fbbf24; /* Your UI/EEE Gold */
            --text: #ffffff;
            --glass-border: rgba(251, 191, 36, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            /* Subtle animated gradient background for depth */
            background: radial-gradient(circle at top right, #1e293b 0%, #0b0e14 100%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 40px 0;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-out;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #8b949e;
            font-size: 1rem;
            font-weight: 400;
        }

        .selection-grid {
            display: flex;
            gap: 20px;
            padding: 20px;
            max-width: 600px;
            width: 90%;
            animation: slideUp 0.6s ease-out;
        }

        .scale-card {
            flex: 1;
            background: var(--card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* Hover Effects */
        .scale-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 
                        0 0 15px rgba(251, 191, 36, 0.1);
            background: rgba(30, 41, 59, 0.8);
        }

        .scale-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.05) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .scale-card:hover::after { opacity: 1; }

        .scale-num {
            display: block;
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .scale-label {
            display: block;
            font-size: 1rem;
            font-weight: 600;
            color: #f0f6fc;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .scale-desc {
            display: block;
            margin-top: 8px;
            font-size: 0.8rem;
            color: #8b949e;
        }

        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(251, 191, 36, 0.1);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 700;
            border: 1px solid var(--glass-border);
        }

        .footer-note {
            margin-top: 50px;
            font-size: 0.75rem;
            color: #484f58;
            letter-spacing: 0.5px;
            opacity: 0.7;
            margin-bottom: 20px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .selection-grid { 
                flex-direction: column; 
                gap: 15px;
                padding: 10px;
                width: 95%;
            }
            .scale-card { 
                padding: 25px 15px; 
            }
            .logo { font-size: 1.6rem; }
            .subtitle { font-size: 0.9rem; }
        }
        /* Light theme */
        [data-theme="light"] body { background: #f0f2f5; color: #1a1a1a; }
        [data-theme="light"] .subtitle { color: #5f6368; }
        [data-theme="light"] .scale-card { background: rgba(255,255,255,0.9); border-color: rgba(0,0,0,0.1); }
        [data-theme="light"] .scale-card:hover { background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        [data-theme="light"] .scale-desc { color: #5f6368; }
        [data-theme="light"] .footer-note { color: #5f6368; }
        .theme-toggle-link { position: fixed; top: 15px; right: 15px; padding: 8px 14px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: var(--accent); font-size: 0.8rem; cursor: pointer; text-decoration: none; z-index: 100; }
        .theme-toggle-link:hover { background: rgba(251,191,36,0.2); }
        [data-theme="light"] .theme-toggle-link { background: rgba(0,0,0,0.05); border-color: #e0e0e0; color: #b45309; }
        
        /* Force install button visibility in browser, hide only when installed */
        #install-btn-index { display: flex !important; }
        @media (display-mode: standalone) {
            #install-btn-index { display: none !important; }
        }
        
        .install-btn-container {
            margin-top: 20px;
            margin-bottom: 60px; /* Extra space for scrolling on phone */
            animation: fadeIn 1.2s ease-out;
        }

        .btn-install {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-install:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<script>
      function evToggleTheme(){
        var c=document.documentElement.getAttribute('data-theme')||'dark';
        var n=c==='dark'?'light':'dark';
        document.documentElement.setAttribute('data-theme',n);
        localStorage.setItem('ev-theme',n);
        document.getElementById('choice-theme-btn').textContent=n==='dark'?'☀️ Light':'🌙 Dark';
      }
      (function(){var t=localStorage.getItem('ev-theme')||'dark';var b=document.getElementById('choice-theme-btn');if(b)b.textContent=t==='dark'?'☀️ Light':'🌙 Dark';})();
    </script>
    
</body>
